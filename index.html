<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblocked Arcade</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Unblocked Arcade home">
        <span class="brand-mark">UA</span>
        <span>Unblocked Arcade</span>
      </a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="#games">Games</a>
        <a href="#queue">Queue</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">Student game hub</p>
          <h1 id="page-title">Fast-launch games for quick breaks.</h1>
          <p class="hero-text">
            Nine sharp picks, one clean browser page, and no install steps.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#games">Browse games</a>
          </div>
        </div>

        <div class="hero-panel" aria-label="Featured game">
          <div class="panel-topline">
            <span class="live-dot"></span>
            <span>Featured</span>
          </div>
          <img
            src="assets/polytrack.svg"
            alt="Polytrack racing thumbnail"
            class="feature-art"
          />
          <div>
            <p class="feature-kicker">Track skill</p>
            <h2>Polytrack</h2>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="Game controls">
        <label class="search-wrap" for="game-search">
          <span>Search</span>
          <input id="game-search" type="search" placeholder="Game title" />
        </label>
        <div class="filter-group" aria-label="Filter games">
          <button class="chip active" type="button" data-filter="all">All</button>
          <button class="chip" type="button" data-filter="logic">Logic</button>
          <button class="chip" type="button" data-filter="racing">Racing</button>
          <button class="chip" type="button" data-filter="driving">Driving</button>
          <button class="chip" type="button" data-filter="arcade">Arcade</button>
          <button class="chip" type="button" data-filter="skill">Skill</button>
          <button class="chip" type="button" data-filter="platform">Platform</button>
        </div>
      </section>

      <section id="games" class="game-grid" aria-label="Available games"></section>

      <section id="queue" class="queue-section" aria-labelledby="queue-title">
        <div class="section-heading">
          <p class="eyebrow">Playlist</p>
          <h2 id="queue-title">Quick queue</h2>
        </div>
        <div class="queue-list" id="queue-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Built with HTML, CSS, and JavaScript.</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
